version: "3.8"

services:
  # ===========================================================================
  # Main Application
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: hermes-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://hermes:hermes@db:5432/hermes
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8002
      - COSYVOICE2_HOST=cosyvoice2
      - COSYVOICE2_PORT=50000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # CosyVoice2 TTS Server (GPU required)
  # ===========================================================================
  cosyvoice2:
    build:
      context: .
      dockerfile: docker/cosyvoice2/Dockerfile
    image: hermes-cosyvoice2:latest
    container_name: hermes-cosyvoice2
    restart: unless-stopped
    ports:
      - "50000:50000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - cosyvoice2_models:/root/.cache/modelscope
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:50000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    profiles:
      - gpu

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: hermes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # ChromaDB Vector Database
  # ===========================================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: hermes-chromadb
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8002:8000"
    networks:
      - hermes-network

  # ===========================================================================
  # Prometheus (Optional - for metrics)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: hermes-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hermes-network
    profiles:
      - monitoring

  # ===========================================================================
  # Grafana (Optional - for dashboards)
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: hermes-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - hermes-network
    profiles:
      - monitoring

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  chroma_data:
  prometheus_data:
  grafana_data:
  cosyvoice2_models:

# =============================================================================
# Networks
# =============================================================================
networks:
  hermes-network:
    driver: bridge
