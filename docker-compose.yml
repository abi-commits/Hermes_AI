version: '3.9'

services:
  hermes-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: hermes:latest
    container_name: hermes-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-hermes}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Chroma Cloud
      CHROMA_CLOUD_URL: ${CHROMA_CLOUD_URL}
      CHROMA_CLOUD_API_KEY: ${CHROMA_CLOUD_API_KEY}
      CHROMA_TENANT: ${CHROMA_TENANT}
      CHROMA_DATABASE: ${CHROMA_DATABASE}
      CHROMADB_COLLECTION: ${CHROMADB_COLLECTION}
      
      # LLM (Gemini)
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      
      # Speech-to-Text (Deepgram)
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      
      # Phone Service (Twilio)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      
      # Database (optional)
      DATABASE_URL: ${DATABASE_URL:-}
      
      # TTS Provider (for Modal remote worker)
      TTS_PROVIDER: ${TTS_PROVIDER:-chatterbox}
      MODAL_TTS_APP_NAME: ${MODAL_TTS_APP_NAME:-}
      MODAL_TTS_CLASS_NAME: ${MODAL_TTS_CLASS_NAME:-}
      MODAL_TTS_SAMPLE_RATE: ${MODAL_TTS_SAMPLE_RATE:-24000}
    
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    restart: unless-stopped
    networks:
      - hermes-network
    
    # Uncomment for local development with volume mounts
    volumes:
       - ./hermes:/app/hermes
       - ./config:/app/config

  hermes-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: hermes:dev
    container_name: hermes-api-dev
    ports:
      - "8001:8000"
    environment:
      APP_ENV: development
      APP_NAME: ${APP_NAME:-hermes}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      
      # Chroma Cloud
      CHROMA_CLOUD_URL: ${CHROMA_CLOUD_URL}
      CHROMA_CLOUD_API_KEY: ${CHROMA_CLOUD_API_KEY}
      CHROMA_TENANT: ${CHROMA_TENANT}
      CHROMA_DATABASE: ${CHROMA_DATABASE}
      CHROMADB_COLLECTION: ${CHROMADB_COLLECTION}
      
      # LLM (Gemini)
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      
      # Speech-to-Text (Deepgram)
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      
      # Phone Service (Twilio)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      
      # Database (optional)
      DATABASE_URL: ${DATABASE_URL:-}
      
      # TTS Provider
      TTS_PROVIDER: ${TTS_PROVIDER:-chatterbox}
    
    volumes:
      - ./hermes:/app/hermes
      - ./config:/app/config
      - ./modal_deploy:/app/modal_deploy
    
    networks:
      - hermes-network
    
    profiles:
      - dev

networks:
  hermes-network:
    driver: bridge
