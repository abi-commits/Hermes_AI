[loggers]
keys=root,hermes,uvicorn

[handlers]
keys=console,console_structured

[formatters]
keys=standard,json

[logger_root]
level=INFO
handlers=console

[logger_hermes]
level=INFO
handlers=console_structured
qualname=hermes
propagate=0

[logger_uvicorn]
level=INFO
handlers=console
qualname=uvicorn
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[handler_console_structured]
class=StreamHandler
level=INFO
formatter=json
args=(sys.stdout,)

[formatter_standard]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_json]
class=hermes.utils.logging.JSONFormatter
format=%(timestamp)s %(level)s %(name)s %(message)s
